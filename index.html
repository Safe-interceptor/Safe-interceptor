      A:{ hl:"\u26a0\ufe0f Deceptive Site Ahead", body:"This site may trick you into doing something dangerous like installing software or revealing personal information.", rs:null, sk:null },
      B:{ hl:"\u26a0\ufe0f Possible Fake Website Detected", body:null, rs:['The page uses alarming language: "account suspended", "verify immediately"',"The website address does not belong to any known bank","The page is asking for sensitive bank details"], sk:null },
      C:{ hl:"\ud83d\udee1\ufe0f Coach: Recognising Urgency Traps", body:null, rs:null, sk:{ name:"Recognising Urgency Traps", lesson:'Attackers create a sense of panic to stop you thinking clearly. Phrases like "account suspended" or "verify immediately" are designed to rush you into acting before you can check. Real banks almost never pressure you like this through a website.', action:"When you see urgent security messages, stop. Don\u2019t click anything or enter any details. Contact your bank directly using the number on the back of your card or their official app.", tip:"This trick is used in many scams \u2014 fake deliveries, tax notices, tech support alerts. The urgency is always the clue." } },
    },
    comp:{ q:"Why do scam pages often use urgent, alarming language?", opts:["Because they are legally required to warn users","To pressure you into acting quickly before you can think carefully","Because urgent pages load faster"], c:1 },
  },
  { id:"S4", pair:"urgency", isPhishing:true, il:"Delivery", cat:"Urgency Manipulation", domain:"parcel-redelivery-fee.com",
    pc:{ h:"QuickPost", sub:"\ud83d\udce6 Delivery attempt failed. A fee of \u00a31.50 is required to rearrange delivery within 24 hours.", f1:"Card number", f2:"Security code on back of card", btn:"Pay \u00a31.50", http:false },
    iv:{
      A:{ hl:"\u26a0\ufe0f Deceptive Site Ahead", body:"This site may trick you into doing something dangerous like installing software or revealing personal information.", rs:null, sk:null },
      B:{ hl:"\u26a0\ufe0f Possible Fake Website Detected", body:null, rs:['The page creates urgency: "delivery failed", "pay within 24 hours"',"The website address does not belong to any known delivery company","The page asks for your full card details for a tiny fee \u2014 a common trick"], sk:null },
      C:{ hl:"\ud83d\udee1\ufe0f Coach: Spotting Fake Payment Requests", body:null, rs:null, sk:{ name:"Spotting Fake Payment Requests", lesson:'Small unexpected fees are a common trick. Attackers know that \u00a31.50 feels harmless, so people type their card details without thinking. But the goal isn\u2019t the fee \u2014 it\u2019s your full card number. Real delivery companies don\u2019t ask for payment through random websites.', action:"If you get a message asking you to pay for a delivery, go directly to the delivery company\u2019s official website or app. Never enter card details on a page you reached through a link.", tip:"This applies to any unexpected small payment \u2014 parking fines, subscription renewals, tax refunds. Always check through official channels." } },
    },
    comp:{ q:"What is the real goal of a fake delivery page asking for a small fee?", opts:["To collect the small fee from many people","To capture your full card details for fraud","To check if your email address works"], c:1 },
  },
  { id:"S5", pair:"technical", isPhishing:true, il:"Amazon", cat:"Technical Deception", domain:"\u0430mazon.com",
    pc:{ h:"amazon", sub:"Sign in to your account", f1:"Email or username", f2:"Password", btn:"Sign In", http:false },
    iv:{
      A:{ hl:"\u26a0\ufe0f Deceptive Site Ahead", body:"This site may trick you into doing something dangerous like installing software or revealing personal information.", rs:null, sk:null },
      B:{ hl:"\u26a0\ufe0f Possible Fake Website Detected", body:null, rs:["The website address uses letters from other alphabets that look identical to English letters but are technically different","The real address of this page is xn--mazon-wqa.com \u2014 not the real amazon.com","The page is asking for your Amazon login details"], sk:null },
      C:{ hl:"\ud83d\udee1\ufe0f Coach: Hidden Lookalike Letters", body:null, rs:null, sk:{ name:"Hidden Lookalike Letters", lesson:'Some alphabets have letters that look exactly like English ones but are technically different characters. Attackers use this to create website addresses that appear genuine. This page\u2019s address looks like "amazon.com" but the first letter is actually from the Cyrillic alphabet \u2014 your browser sees a completely different website.', action:"If a login page appears unexpectedly, check the address bar carefully. Modern browsers sometimes show a warning or unusual encoding. When in doubt, type the website address yourself.", tip:"This attack works because our eyes read shapes, not computer codes. Bookmarking your important websites is one of the best defences." } },
    },
    comp:{ q:"What trick did this fake website use to look like the real Amazon?", opts:["It used encryption to hide its identity","It used letters from other alphabets that look identical to English letters, making the address appear genuine","It copied Amazon\u2019s entire website code"], c:1 },
  },
  { id:"S6", pair:"technical", isPhishing:true, il:"Google", cat:"Technical Deception", domain:"google-signin.net",
    pc:{ h:"Google", sub:"Sign in to your account", f1:"Email or username", f2:"Password", btn:"Sign In", http:true },
    iv:{
      A:{ hl:"\u26a0\ufe0f Deceptive Site Ahead", body:"This site may trick you into doing something dangerous like installing software or revealing personal information.", rs:null, sk:null },
      B:{ hl:"\u26a0\ufe0f Possible Fake Website Detected", body:null, rs:['This page shows "Not secure" instead of a padlock \u2014 your data is sent without protection',"The address google-signin.net is not an official Google address","The page asks for your Google login details on an unprotected connection"], sk:null },
      C:{ hl:"\ud83d\udee1\ufe0f Coach: Checking Connection Security", body:null, rs:null, sk:{ name:"Checking Connection Security", lesson:'Every real login page shows a padlock icon (\ud83d\udd12) in the address bar. This page shows "Not secure" instead, meaning anything you type \u2014 including passwords \u2014 is sent openly and could be seen by anyone on the network. No real company would ask for your password this way.', action:'Before typing any password, look for the padlock icon at the top of your screen. If you see "Not secure" or the padlock is missing, do not enter any personal information.', tip:"A padlock alone doesn\u2019t guarantee a site is safe \u2014 but a missing padlock on a login page is always a warning sign." } },
    },
    comp:{ q:'Why is it dangerous to enter a password on a page that shows "Not secure" instead of a padlock?', opts:["Pages without a padlock always contain viruses","Your password is sent without protection, so anyone on the network could see it","Pages without a padlock cannot save your login correctly"], c:1 },
  },

// ==================== LATIN SQUARE ====================
const LS = [["A","B","C","A","B","C"],["B","C","A","B","C","A"],["C","A","B","C","A","B"],["A","C","B","C","B","A"],["B","A","C","A","C","B"],["C","B","A","B","A","C"]];
const CL = { A:"Generic Warning", B:"Warning + Reasons", C:"Skill-Based Coach" };

function buildSeq(lg, lang) {
  const d = getScenarios(lang);
  const co = LS[lg];
  const ph = d.phishing.map((s,i) => ({...s, condition:co[i]}));
  const le = d.legitimate.map(s => ({...s, condition:"B"}));
  const seq = [...ph]; seq.splice(3,0,le[0]); seq.splice(6,0,le[1]);
  return { main: seq, transfer: d.transfer };
}

function mkCSV(d){
  const h=["participant_id","latin_group","language","age","gender","tech_confidence","phishing_experience","scenario_index","scenario_id","scenario_category","is_phishing","condition","condition_label","decision","decision_time_ms","difficulty_perception","comprehension_answer","comprehension_correct","confidence","helpfulness_A","helpfulness_B","helpfulness_C","disruption_A","disruption_B","disruption_C","self_efficacy_A","self_efficacy_B","self_efficacy_C","preference","open_text","transfer_T1_decision","transfer_T1_correct","transfer_T2_decision","transfer_T2_correct","transfer_T3_decision","transfer_T3_correct"];
  const tr=d.transferResults||[];
  const trd=(id)=>{const r=tr.find(x=>x.id===id);return r?[r.decision,r.correct?1:0]:["",""];};
  const [t1d,t1c]=trd("T1"),[t2d,t2c]=trd("T2"),[t3d,t3c]=trd("T3");
  const ps=d.postStudy;
  const rows=d.scenarioResults.map((r,i)=>[d.participantId,d.latinGroup,d.language,d.demographics.age,d.demographics.gender,d.demographics.techConf,d.demographics.phishExp,i+1,r.scenarioId,r.category,r.isPhishing?1:0,r.condition,CL[r.condition]||"Warning + Reasons",r.decision,r.decisionTimeMs,r.difficulty,r.compAnswer,r.compCorrect?1:0,r.confidence,ps.help.A,ps.help.B,ps.help.C,ps.disr.A,ps.disr.B,ps.disr.C,ps.se.A,ps.se.B,ps.se.C,ps.preference,`"${(ps.openText||"").replace(/"/g,'""')}"`,t1d,t1c,t2d,t2c,t3d,t3c]);
  return [h.join(","),...rows.map(r=>r.join(","))].join("\n");
}
function mkMailto(d){const csv=mkCSV(d);return `mailto:${RESEARCHER_EMAIL}?subject=${encodeURIComponent(`Safe Interceptor — ${d.participantId}`)}&body=${encodeURIComponent(`Participant: ${d.participantId}\nLang: ${d.language}\nGroup: ${d.latinGroup}\n\n${csv}`)}`;}

function App(){

  const [lg]=useState(()=>Date.now()%LS.length); const seqs=useRef(null);
  const pid=useRef(`P${Date.now().toString(36).toUpperCase()}`);

  const hLang=(l)=>{setLang(l);seqs.current=buildSeq(lg,l);setStage("consent");};
  const mainTotal=seqs.current?seqs.current.main.length:8;
  const trTotal=seqs.current?seqs.current.transfer.length:3;

  const hScenDone=(r)=>{const u=[...sr,r];setSR(u);if(si<mainTotal-1)setSI(si+1);else setStage("transferIntro");};
  const hTransDone=(r)=>{const u=[...tr,r];setTR(u);if(ti<trTotal-1)setTI(ti+1);else setStage("post");};
  const hPost=(ps)=>{setAll({participantId:pid.current,latinGroup:lg,language:lang,demographics:demo,scenarioResults:sr,transferResults:tr,postStudy:ps,completedAt:new Date().toISOString()});setStage("done");};

  useEffect(()=>{const l=document.createElement("link");l.href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap";l.rel="stylesheet";document.head.appendChild(l);},[]);
  useEffect(()=>{window.scrollTo({top:0,behavior:"smooth"});},[stage,si,ti]);

  return <LangCtx.Provider value={lang||"en"}>
    <style>{`*{box-sizing:border-box;margin:0}body{margin:0;background:#f1f5f9}input[type="range"]{height:6px}button:active{transform:scale(.97)}`}</style>
    {stage==="lang"&&<LangPage onSelect={hLang}/>}
    {stage==="consent"&&<ConsentPage onOk={()=>setStage("demo")}/>}
    {stage==="demo"&&<DemoPage onSubmit={d=>{setDemo(d);setStage("scenario");}}/>}
    {stage==="scenario"&&seqs.current&&<ScenPage key={si} s={seqs.current.main[si]} idx={si} total={mainTotal} onDone={hScenDone}/>}
    {stage==="transferIntro"&&<TransferIntroPage onGo={()=>setStage("transfer")}/>}
    {stage==="transfer"&&seqs.current&&<TransferPage key={ti} s={seqs.current.transfer[ti]} idx={ti} total={trTotal} onDone={hTransDone}/>}
    {stage==="post"&&<PostPage onSubmit={hPost}/>}
    {stage==="done"&&all&&<DonePage data={all}/>}
  </LangCtx.Provider>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
