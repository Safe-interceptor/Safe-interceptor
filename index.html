  return S[lang] || S.en;
}

// ---------- LATIN SQUARE + SEQUENCE ----------

const LATIN_SQUARES = [
  ["A","B","C","A","B","C"], ["B","C","A","B","C","A"], ["C","A","B","C","A","B"],
  ["A","C","B","C","B","A"], ["B","A","C","A","C","B"], ["C","B","A","B","A","C"],
];
const CONDITION_LABELS = { A: "Generic Warning", B: "Warning + Reasons", C: "Skill-Based Coach" };

function buildScenarioSequence(latinGroup, lang) {
  const data = getScenarios(lang);
  const conditionOrder = LATIN_SQUARES[latinGroup];
  const phishing = data.phishing.map((s, i) => ({ ...s, condition: conditionOrder[i] }));
  const legit = data.legitimate.map((s) => ({ ...s, condition: "B" }));
  const seq = [...phishing];
  seq.splice(3, 0, legit[0]);
  seq.splice(6, 0, legit[1]);
  return seq;
}

function buildCSV(data) {
  const headers = ["participant_id","latin_group","language","age","gender","tech_confidence","phishing_experience","scenario_index","scenario_id","scenario_category","is_phishing","condition","condition_label","decision","decision_time_ms","comprehension_answer","comprehension_correct","confidence","annoyance_A","annoyance_B","annoyance_C","preference","open_text"];
  const rows = data.scenarioResults.map((r, i) => [
    data.participantId, data.latinGroup, data.language, data.demographics.age, data.demographics.gender,
    data.demographics.techConf, data.demographics.phishExp, i+1, r.scenarioId, r.category,
    r.isPhishing ? 1 : 0, r.condition, CONDITION_LABELS[r.condition] || "Warning + Reasons",
    r.decision, r.decisionTimeMs, r.comprehensionAnswer, r.comprehensionCorrect ? 1 : 0,
    r.confidence, data.postStudy.annoyance.A, data.postStudy.annoyance.B, data.postStudy.annoyance.C,
    data.postStudy.preference, `"${(data.postStudy.openText || "").replace(/"/g, '""')}"`,
  ]);
  return [headers.join(","), ...rows.map(r => r.join(","))].join("\n");
}

function buildMailtoLink(data) {
  const csv = buildCSV(data);
  const subject = encodeURIComponent(`Safe Interceptor Study — ${data.participantId}`);
  const body = encodeURIComponent(`Hi,\n\nPlease find my Safe Interceptor study results below.\n\nParticipant ID: ${data.participantId}\nCompleted: ${data.completedAt}\nLatin Group: ${data.latinGroup}\nLanguage: ${data.language}\n\n--- CSV DATA ---\n\n${csv}\n\n--- END ---`);
  return `mailto:${RESEARCHER_EMAIL}?subject=${subject}&body=${body}`;
}

    <div style={pageContainer}>
      <div style={{ ...card, textAlign: "center" }}>
        <div style={{ fontSize: 48, marginBottom: 12 }}>{submitState === "submitting" ? "⏳" : "✅"}</div>
        <h2 style={{ fontSize: 24, fontWeight: 700, margin: "0 0 8px", color: "#111" }}>{t.thankYou}</h2>
        {submitState === "submitting" && <div style={{ background: "#eff6ff", border: "2px solid #93c5fd", borderRadius: 12, padding: "16px 20px", margin: "16px 0" }}><p style={{ fontSize: 14, color: "#1e40af", margin: 0 }}>{t.submitting}</p></div>}
        {submitState === "success" && <div style={{ background: "#f0fdf4", border: "2px solid #22c55e", borderRadius: 12, padding: "16px 20px", margin: "16px 0" }}><p style={{ fontSize: 15, fontWeight: 600, color: "#15803d", margin: "0 0 4px" }}>{t.successTitle}</p><p style={{ fontSize: 13, color: "#166534", margin: 0 }}>{t.successSub}</p></div>}
        {submitState === "failed" && (
          <div style={{ background: "#fef2f2", border: "2px solid #fca5a5", borderRadius: 12, padding: "16px 20px", margin: "16px 0" }}>
            <p style={{ fontSize: 14, fontWeight: 600, color: "#991b1b", margin: "0 0 12px" }}>{t.failedTitle}</p>
            <button onClick={() => { window.open(buildMailtoLink(data), "_blank"); setEmailOpened(true); }} style={{ background: "#16a34a", color: "#fff", border: "none", borderRadius: 10, padding: "12px 28px", fontSize: 15, fontWeight: 700, cursor: "pointer" }}>{t.sendEmail}</button>
            {emailOpened && <p style={{ marginTop: 8, fontSize: 13, color: "#15803d", fontWeight: 600 }}>{t.emailOpened}</p>}
          </div>
        )}
        <details style={{ textAlign: "left", marginTop: 20 }}>
          <summary style={{ fontSize: 13, color: "#888", cursor: "pointer", marginBottom: 8 }}>{t.downloadPrompt}</summary>
          <div style={{ display: "flex", gap: 10, justifyContent: "center", padding: "8px 0" }}>
            <button onClick={downloadCSV} style={{ ...btnNext, background: "#6366f1", fontSize: 13, padding: "8px 16px", marginTop: 0 }}>{t.downloadCSV}</button>
            <button onClick={downloadJSON} style={{ ...btnNext, background: "#475569", fontSize: 13, padding: "8px 16px", marginTop: 0 }}>{t.downloadJSON}</button>
          </div>
        </details>
        <p style={{ marginTop: 20, fontSize: 12, color: "#bbb" }}>Participant ID: {data.participantId}</p>
      </div>
    </div>
  );
}

// ---------- HELPERS ----------

function FieldLabel({ label, children }) {
  return <div style={{ marginBottom: 18 }}><div style={{ fontSize: 14, fontWeight: 600, color: "#333", marginBottom: 8 }}>{label}</div>{children}</div>;
}

function SelectGroup({ options, value, onChange }) {
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
      {options.map(opt => (
        <button key={opt} onClick={() => onChange(opt)} style={{
          padding: "8px 16px", borderRadius: 8, fontSize: 13, cursor: "pointer",
          border: value === opt ? "2px solid #4f46e5" : "2px solid #e5e7eb",
          background: value === opt ? "#eef2ff" : "#fff",
          color: value === opt ? "#4338ca" : "#555",
          fontWeight: value === opt ? 600 : 400,
        }}>{opt}</button>
      ))}
    </div>
  );
}

const pageContainer = { minHeight: "100vh", display: "flex", alignItems: "flex-start", justifyContent: "center", padding: "40px 16px", background: "#f1f5f9", fontFamily: "'Outfit', system-ui, -apple-system, sans-serif" };
const card = { background: "#fff", borderRadius: 16, padding: "32px 28px", maxWidth: 520, width: "100%", boxShadow: "0 1px 3px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.04)" };

// ---------- MAIN APP ----------

function App() {
  const [lang, setLang] = useState(null);
  const [stage, setStage] = useState("lang");
  const [demographics, setDemographics] = useState(null);
  const [scenarioIndex, setScenarioIndex] = useState(0);
  const [scenarioResults, setScenarioResults] = useState([]);
  const [allData, setAllData] = useState(null);

  const [latinGroup] = useState(() => Date.now() % LATIN_SQUARES.length);
  const scenarios = useRef(null);
  const participantId = useRef(`P${Date.now().toString(36).toUpperCase()}`);

  const handleLang = (l) => { setLang(l); scenarios.current = buildScenarioSequence(latinGroup, l); setStage("consent"); };
  const totalScenarios = scenarios.current ? scenarios.current.length : 8;

  const handleScenarioComplete = (result) => {
    const updated = [...scenarioResults, result];
    setScenarioResults(updated);
    if (scenarioIndex < totalScenarios - 1) setScenarioIndex(scenarioIndex + 1);
    else setStage("postStudy");
  };

  const handlePostStudy = (postData) => {
    const fullData = { participantId: participantId.current, latinGroup, language: lang, demographics, scenarioResults, postStudy: postData, completedAt: new Date().toISOString() };
    setAllData(fullData);
    setStage("complete");
  };

  useEffect(() => { const link = document.createElement("link"); link.href = "https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"; link.rel = "stylesheet"; document.head.appendChild(link); }, []);
  useEffect(() => { window.scrollTo({ top: 0, behavior: "smooth" }); }, [stage, scenarioIndex]);

  return (
    <LangContext.Provider value={lang || "en"}>
      <style>{`* { box-sizing: border-box; margin: 0; } body { margin: 0; background: #f1f5f9; } input[type="range"] { height: 6px; } button:active { transform: scale(0.97); }`}</style>
      {stage === "lang" && <LangPickerPage onSelect={handleLang} />}
      {stage === "consent" && <ConsentPage onConsent={() => setStage("demographics")} />}
      {stage === "demographics" && <DemographicsPage onSubmit={(d) => { setDemographics(d); setStage("scenario"); }} />}
      {stage === "scenario" && scenarios.current && <ScenarioPage key={scenarioIndex} scenario={scenarios.current[scenarioIndex]} scenarioIndex={scenarioIndex} total={totalScenarios} onComplete={handleScenarioComplete} />}
      {stage === "postStudy" && <PostStudyPage onSubmit={handlePostStudy} />}
      {stage === "complete" && <CompletionPage data={allData} />}
    </LangContext.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
