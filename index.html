// Latin square counterbalancing for the 6 phishing scenarios
const LATIN_SQUARES = [
  ["A", "B", "C", "A", "B", "C"],
  ["B", "C", "A", "B", "C", "A"],
  ["C", "A", "B", "C", "A", "B"],
  ["A", "C", "B", "C", "B", "A"],
  ["B", "A", "C", "A", "C", "B"],
  ["C", "B", "A", "B", "A", "C"],
];

const CONDITION_LABELS = { A: "Generic Warning", B: "Warning + Reasons", C: "Skill-Based Coach" };

// Build the 8-scenario sequence: 6 phishing + 2 legit inserted at positions 4 and 7
function buildScenarioSequence(latinGroup) {
  const conditionOrder = LATIN_SQUARES[latinGroup];
  const phishing = PHISHING_SCENARIOS.map((s, i) => ({
    ...s,
    condition: conditionOrder[i],
  }));
  const legit = LEGITIMATE_SCENARIOS.map((s) => ({
    ...s,
    condition: "B",
  }));

  // Insert L1 after 3rd phishing (index 3), L2 after 5th phishing (index 6 after first insert)
  const sequence = [...phishing];
  sequence.splice(3, 0, legit[0]);
  sequence.splice(6, 0, legit[1]);
  return sequence;
}

function buildCSV(data) {
  const headers = [
    "participant_id", "latin_group", "age", "gender", "tech_confidence", "phishing_experience",
    "scenario_index", "scenario_id", "scenario_category", "is_phishing",
    "condition", "condition_label",
    "decision", "decision_time_ms", "comprehension_answer", "comprehension_correct",
    "confidence", "annoyance_A", "annoyance_B", "annoyance_C", "preference", "open_text"
  ];

  const rows = data.scenarioResults.map((r, i) => [
    data.participantId,
    data.latinGroup,
    data.demographics.age,
    data.demographics.gender,
    data.demographics.techConf,
    data.demographics.phishExp,
    i + 1,
    r.scenarioId,
    r.category,
    r.isPhishing ? 1 : 0,
    r.condition,
    CONDITION_LABELS[r.condition] || "Warning + Reasons",
    r.decision,
    r.decisionTimeMs,
    r.comprehensionAnswer,
    r.comprehensionCorrect ? 1 : 0,
    r.confidence,
    data.postStudy.annoyance.A,
    data.postStudy.annoyance.B,
    data.postStudy.annoyance.C,
    data.postStudy.preference,
    `"${(data.postStudy.openText || "").replace(/"/g, '""')}"`,
  ]);

  return [headers.join(","), ...rows.map((r) => r.join(","))].join("\n");
}

function buildMailtoLink(data) {
  const csv = buildCSV(data);
  const subject = encodeURIComponent(`Safe Interceptor Study — ${data.participantId}`);
  const body = encodeURIComponent(
    `Hi,\n\nPlease find my Safe Interceptor study results below.\n\nParticipant ID: ${data.participantId}\nCompleted: ${data.completedAt}\nLatin Group: ${data.latinGroup}\n\n--- CSV DATA (paste everything below into a .csv file) ---\n\n${csv}\n\n--- END ---`
  );
  return `mailto:${RESEARCHER_EMAIL}?subject=${subject}&body=${body}`;
}

function CompletionPage({ data }) {
  const [submitState, setSubmitState] = useState("idle");
  const [emailOpened, setEmailOpened] = useState(false);
  const hasAttempted = useRef(false);

  useEffect(() => {
    if (hasAttempted.current) return;
    hasAttempted.current = true;
    setSubmitState("submitting");

    const jsonPayload = JSON.stringify(data);
    const formData = new URLSearchParams();
    formData.append(GOOGLE_FORM_ENTRY, jsonPayload);

    fetch(GOOGLE_FORM_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: formData.toString(),
    })
      .then(() => {
        setSubmitState("success");
      })
      .catch(() => {
        setSubmitState("failed");
      });
  }, [data]);

  const mailtoLink = buildMailtoLink(data);

  const handleSendEmail = () => {
    window.open(mailtoLink, "_blank");
    setEmailOpened(true);
  };

  const downloadCSV = () => {
    const csv = buildCSV(data);
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `safe-interceptor-${data.participantId}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const downloadJSON = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `safe-interceptor-${data.participantId}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div style={pageContainer}>
      <div style={{ ...card, textAlign: "center" }}>
        <div style={{ fontSize: 48, marginBottom: 12 }}>
          {submitState === "submitting" ? "⏳" : "✅"}
        </div>
        <h2 style={{ fontSize: 24, fontWeight: 700, margin: "0 0 8px", color: "#111" }}>
          Thank You!
        </h2>

        {submitState === "submitting" && (
          <div style={{
            background: "#eff6ff", border: "2px solid #93c5fd", borderRadius: 12,
            padding: "16px 20px", margin: "16px 0",
          }}>
            <p style={{ fontSize: 14, color: "#1e40af", margin: 0 }}>
              Sending your results automatically...
            </p>
          </div>
        )}

        {submitState === "success" && (
          <div style={{
            background: "#f0fdf4", border: "2px solid #22c55e", borderRadius: 12,
            padding: "16px 20px", margin: "16px 0",
          }}>
            <p style={{ fontSize: 15, fontWeight: 600, color: "#15803d", margin: "0 0 4px" }}>
              Your results have been submitted successfully
            </p>
            <p style={{ fontSize: 13, color: "#166534", margin: 0 }}>
              No further action needed. You may close this tab. Thank you for participating!
            </p>
          </div>
        )}

        {submitState === "failed" && (
          <div style={{
            background: "#fef2f2", border: "2px solid #fca5a5", borderRadius: 12,
            padding: "16px 20px", margin: "16px 0",
          }}>
            <p style={{ fontSize: 14, fontWeight: 600, color: "#991b1b", margin: "0 0 12px" }}>

            <button onClick={handleSendEmail} style={{

function App() {
  const [stage, setStage] = useState("consent");
  const [demographics, setDemographics] = useState(null);
  const [scenarioIndex, setScenarioIndex] = useState(0);
  const [scenarioResults, setScenarioResults] = useState([]);
  const [allData, setAllData] = useState(null);

  const [latinGroup] = useState(() => Date.now() % LATIN_SQUARES.length);
  const scenarios = useRef(buildScenarioSequence(latinGroup));
  const participantId = useRef(`P${Date.now().toString(36).toUpperCase()}`);

  const totalScenarios = scenarios.current.length;

  const handleConsent = () => setStage("demographics");

  const handleDemographics = (data) => {
    setDemographics(data);
    setStage("scenario");
  };

  const handleScenarioComplete = (result) => {
    const updated = [...scenarioResults, result];
    setScenarioResults(updated);

    if (scenarioIndex < totalScenarios - 1) {
      setScenarioIndex(scenarioIndex + 1);
    } else {
      setStage("postStudy");
    }
  };

  const handlePostStudy = (postData) => {
    const fullData = {
      participantId: participantId.current,
      latinGroup,
      demographics,
      scenarioResults,
      postStudy: postData,
      completedAt: new Date().toISOString(),
    };
    setAllData(fullData);
    setStage("complete");
  };

  useEffect(() => {
    const link = document.createElement("link");
    link.href = "https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap";
    link.rel = "stylesheet";
    document.head.appendChild(link);
  }, []);

  useEffect(() => {
    window.scrollTo({ top: 0, behavior: "smooth" });
  }, [stage, scenarioIndex]);

  return (
    <>
      <style>{`
        * { box-sizing: border-box; margin: 0; }
        body { margin: 0; background: #f1f5f9; }
        input[type="range"] { height: 6px; }
        button:active { transform: scale(0.97); }
      `}</style>

      {stage === "consent" && <ConsentPage onConsent={handleConsent} />}
      {stage === "demographics" && <DemographicsPage onSubmit={handleDemographics} />}
      {stage === "scenario" && (
        <ScenarioPage
          key={scenarioIndex}
          scenario={scenarios.current[scenarioIndex]}
          scenarioIndex={scenarioIndex}
          total={totalScenarios}
          onComplete={handleScenarioComplete}
        />
      )}
      {stage === "postStudy" && <PostStudyPage onSubmit={handlePostStudy} />}
      {stage === "complete" && <CompletionPage data={allData} />}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
